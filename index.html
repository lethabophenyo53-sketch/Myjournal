<!DOCTYPE html>
<html>
<head>
<title>My Journal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- COVER -->
<div class="cover" onclick="openBook()">
  <img src="Cover page.jpg">
  <h1>My Journey ✨</h1>
</div>

<!-- BOOK -->
<div class="book" id="book">

<!-- PERSONAL -->
<div class="page active">
  <h1>Your Journey ✨</h1>

  <div class="map">
    <div class="bubble top">Name <input id="name"></div>
    <div class="bubble left">Age <input id="age"></div>
    <div class="bubble right">Dreams <input id="dreams"></div>
    <div class="bubble bottom">Energy <input id="energy"></div>

    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>
  </div>
</div>

<!-- WEEKLY -->
<div class="page">

  <h1 class="heading">Weekly Planner</h1>

  <div class="week-container">

    <!-- LEFT -->
    <div class="left">

      <div class="week-box">
        <label>Week of:</label>
        <input type="text" id="week">
      </div>

      <div class="notes-box">
        <h3>Notes</h3>
        <textarea id="weekly_notes"></textarea>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="day-card"><b>Monday</b><textarea id="mon"></textarea></div>
      <div class="day-card"><b>Tuesday</b><textarea id="tue"></textarea></div>
      <div class="day-card"><b>Wednesday</b><textarea id="wed"></textarea></div>
      <div class="day-card"><b>Thursday</b><textarea id="thu"></textarea></div>
      <div class="day-card"><b>Friday</b><textarea id="fri"></textarea></div>
      <div class="day-card"><b>Saturday</b><textarea id="sat"></textarea></div>
      <div class="day-card"><b>Sunday</b><textarea id="sun"></textarea></div>

    </div>

  </div>

</div>

<!-- TODO -->
<div class="page">
  <h1>To Do 💖</h1>
  <input class="todo" id="t1">
  <input class="todo" id="t2">
  <input class="todo" id="t3">
  <input class="todo" id="t4">
</div>

<!-- REFLECTION -->
<div class="page">
  <h1>Daily Reflection</h1>

  <input type="date" id="date">

  <textarea id="feel" class="big" placeholder="How do you feel?"></textarea>
  <textarea id="why" class="big" placeholder="Why?"></textarea>
  <textarea id="day" class="big" placeholder="What happened?"></textarea>

  <div class="mood">
    😊 😐 😢 😍
  </div>
</div>

<!-- NOTES -->
<div class="page">
  <h1>Notes</h1>
  <textarea class="big"></textarea>
</div>

<!-- AFFIRM -->
<div class="page">
  <h1>Affirmation</h1>
  <div class="cloud">I am the main character.</div>
  <textarea class="big"></textarea>
</div>

<!-- STORY -->
<div class="page">
  <h1>Real Story</h1>
  <p>You are growing. Trust the process.</p>
  <textarea class="big"></textarea>
</div>

<!-- GLOW -->
<div class="page">
  <h1>Glow ✨</h1>
  <label><input type="checkbox"> Water</label>
  <label><input type="checkbox"> Skincare</label>
  <label><input type="checkbox"> Mind</label>
  <label><input type="checkbox"> Exercise</label>
</div>

<!-- CLOSE -->
<div class="page">
  <h1>Closing</h1>
  <textarea class="big"></textarea>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<script src="app.js"></script>

</body>
</html>
