<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Veloura Journal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- COVER -->
<div class="cover" onclick="openBook()">
  <img src="Cover page.jpg" alt="cover">
  <h2 class="heading">✨My Journal</h2>
</div>

<!-- BOOK -->
<div class="book" id="book">

  <!-- PAGE 1 -->
<div class="page">
  <h1 class="title">✨ Your Journey Map ✨</h1>

  <div class="map">

    <div class="bubble pink top">
      <span>💖 Name</span>
      <textarea></textarea>
    </div>

    <div class="bubble blue left">
      <span>🌷 Age</span>
      <textarea></textarea>
    </div>

    <div class="bubble purple right">
      <span>🌈 Dream</span>
      <textarea></textarea>
    </div>

    <div class="bubble yellow bottom">
      <span>⚡ Energy</span>
      <textarea></textarea>
    </div>

    <!-- sparkles -->
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">💫</div>
    <div class="sparkle s3">✨</div>
    <div class="sparkle s4">💖</div>

    <!-- lines -->
    <div class="line v"></div>
    <div class="line h"></div>

  </div>
</div>

  <!-- PAGE 2 -->
  <div class="page">
  <h1 class="title">📅 Weekly Planner</h1>

  <div class="week">

    <!-- LEFT SIDE -->
    <div class="week-left">

      <input id="weekOf" placeholder="Week of (e.g. 6–12 April)" class="week-input">

      <textarea id="weeklyNotes" class="notes-box" placeholder="Weekly notes..."></textarea>

    </div>

    <!-- RIGHT SIDE -->
    <div class="week-right">

      <div class="day">
        <h3>Mon</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Tue</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Wed</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Thu</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Fri</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Sat</h3>
        <textarea></textarea>
      </div>

      <div class="day">
        <h3>Sun</h3>
        <textarea></textarea>
      </div>

    </div>

  </div>
</div>
  <!-- PAGE 3 -->
 <div class="page">
  <h1 class="title">🌷 Daily Reflection</h1>

  <input type="date" id="date" class="date-input">

  <textarea id="feel" class="big-box" placeholder="How are you feeling today?"></textarea>

  <textarea id="why" class="big-box" placeholder="Why do you feel this way?"></textarea>

  <textarea id="whatHappened" class="big-box" placeholder="What happened today?"></textarea>

  <!-- MOOD -->
  <div class="mood">
    <span onclick="moodRain('😊')">😊</span>
    <span onclick="moodRain('😐')">😐</span>
    <span onclick="moodRain('😢')">😢</span>
    <span onclick="moodRain('😍')">😍</span>
    <span onclick="moodRain('🔥')">🔥</span>
  </div>
</div>

  <!-- PAGE 4 -->
  <div class="page">
    <h2 class="heading">💖 To-Do</h2>
    <input class="todo" id="todo1">
    <input class="todo" id="todo2">
    <input class="todo" id="todo3">
    <input class="todo" id="todo4">
  </div>

</div>

  <div class="page">
  <h1>Real Story 📖</h1>

  <p class="subtitle">Your growth, your journey, your truth.</p>

  <textarea class="big" placeholder="Where did your story begin?"></textarea>
  <textarea class="big" placeholder="What changed you?"></textarea>
  <textarea class="big" placeholder="What are you becoming?"></textarea>
</div>

  <div class="page">
  <h1>Glow Routine ✨</h1>

  <label><input type="checkbox"> Drink water 💧</label><br>
  <label><input type="checkbox"> Skincare 🧴</label><br>
  <label><input type="checkbox"> Exercise 🏃‍♀️</label><br>
  <label><input type="checkbox"> Read / Learn 📚</label><br>
  <label><input type="checkbox"> Rest 💤</label>
</div>

  <div class="page">
  <h1>Closing 💌</h1>

  <textarea class="big" placeholder="What did you learn this week?"></textarea>
  <textarea class="big" placeholder="What are you grateful for?"></textarea>

  <p style="text-align:center; margin-top:15px;">
    ✨ You survived, you grew, you became stronger ✨
  </p>
</div>

  

<!-- NAV -->
<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<script src="app.js"></script>
</body>
</html>
