<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Veloura Journal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- COVER -->
<div class="cover" onclick="openBook()">
  <img src="Cover page.jpg" alt="cover">
  <h2 class="heading">✨My Journey</h2>
</div>

<!-- BOOK -->
<div class="book" id="book">

  <!-- PAGE 1 -->
  <div class="page active">
    <h2 class="heading">✨ Your Journey Map</h2>

    <div class="profile-map">
      <div class="bubble">Name <input id="name"></div>
      <div class="bubble">Age <input id="age"></div>
      <div class="bubble">Dream <input id="dream"></div>
      <div class="bubble">Energy <input id="energy"></div>

      <div class="line l1"></div>
      <div class="line l2"></div>
      <div class="line l3"></div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <h2 class="heading">Weekly Planner</h2>

    <div class="week-container">

      <div class="left">
        <div class="week-box">
          <label>Week of:</label>
          <input id="week" placeholder="6–12 April 2026">
        </div>

        <div class="notes-box">
          <h3>Notes</h3>
          <textarea id="weekly_notes"></textarea>
        </div>
      </div>

      <div class="right">
        <div class="day-card"><h4>Mon</h4><textarea id="mon"></textarea></div>
        <div class="day-card"><h4>Tue</h4><textarea id="tue"></textarea></div>
        <div class="day-card"><h4>Wed</h4><textarea id="wed"></textarea></div>
        <div class="day-card"><h4>Thu</h4><textarea id="thu"></textarea></div>
        <div class="day-card"><h4>Fri</h4><textarea id="fri"></textarea></div>
        <div class="day-card"><h4>Sat</h4><textarea id="sat"></textarea></div>
        <div class="day-card"><h4>Sun</h4><textarea id="sun"></textarea></div>
      </div>

    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <h2 class="heading">🌷 Daily Reflection</h2>

    <input type="date" id="date">

    <textarea class="big-input" id="feel" placeholder="Today I feel..."></textarea>
    <textarea class="big-input" id="why" placeholder="Why?"></textarea>
    <textarea class="big-input" id="happened" placeholder="What happened?"></textarea>

    <div class="mood">
      <span onclick="selectMood(this)">😊</span>
      <span onclick="selectMood(this)">😐</span>
      <span onclick="selectMood(this)">😔</span>
      <span onclick="selectMood(this)">😡</span>
      <span onclick="selectMood(this)">😍</span>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <h2 class="heading">💖 To-Do</h2>
    <input class="todo" id="todo1">
    <input class="todo" id="todo2">
    <input class="todo" id="todo3">
    <input class="todo" id="todo4">
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="prev()">⬅</button>
  <button onclick="next()">➡</button>
</div>

<script src="app.js"></script>
</body>
</html>
