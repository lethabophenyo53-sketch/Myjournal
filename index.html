<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Veloura Journal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- COVER -->
<div class="cover" onclick="openBook()">
  <img src="Cover page.jpg" alt="cover">
  <h2 class="heading">✨My Journal</h2>
</div>

  <div class="page active" id="homePage">

  <h1 class="title">🌸 My Journal</h1>

  <button onclick="showNewEntry()" class="new-btn">
    + New Entry
  </button>

  <div id="entryList"></div>

</div>   

<div class="book" id="book">

  <!-- PAGE 1 -->
  <div class="page">
    <h1 class="title">✨ Your Journey Map ✨</h1>

    <div class="map">
      <div class="bubble pink top">
        <span>💖 Name</span>
        <textarea></textarea>
      </div>

      <div class="bubble blue left">
        <span>🌷 Age</span>
        <textarea></textarea>
      </div>

      <div class="bubble purple right">
        <span>🌈 Dream</span>
        <textarea></textarea>
      </div>

      <div class="bubble yellow bottom">
        <span>⚡ Energy</span>
        <textarea></textarea>
      </div>

      <div class="sparkle s1">✨</div>
      <div class="sparkle s2">💫</div>
      <div class="sparkle s3">✨</div>
      <div class="sparkle s4">💖</div>

      <div class="line v"></div>
      <div class="line h"></div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <h1 class="title">📅 Weekly Planner</h1>

    <div class="week">
      <div class="week-left">
        <input id="weekOf" placeholder="Week of..." class="week-input">
        <textarea id="weeklyNotes" class="notes-box"></textarea>
      </div>

      <div class="week-right">
        <div class="day"><h3>Mon</h3><textarea></textarea></div>
        <div class="day"><h3>Tue</h3><textarea></textarea></div>
        <div class="day"><h3>Wed</h3><textarea></textarea></div>
        <div class="day"><h3>Thu</h3><textarea></textarea></div>
        <div class="day"><h3>Fri</h3><textarea></textarea></div>
        <div class="day"><h3>Sat</h3><textarea></textarea></div>
        <div class="day"><h3>Sun</h3><textarea></textarea></div>
      </div>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <h1 class="title">🌷 Daily Reflection</h1>

    <input type="date" id="date" class="date-input">

    <textarea id="feel" class="big-box"></textarea>
    <textarea id="why" class="big-box"></textarea>
    <textarea id="whatHappened" class="big-box"></textarea>

    <div class="mood">
      <span onclick="moodRain('😊')">😊</span>
      <span onclick="moodRain('😐')">😐</span>
      <span onclick="moodRain('😢')">😢</span>
      <span onclick="moodRain('😍')">😍</span>
      <span onclick="moodRain('🔥')">🔥</span>
    </div>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <h1 class="title">💖 To-Do List</h1>

    <div class="todo-container">
      <div class="todo-item"><input type="text"></div>
      <div class="todo-item"><input type="text"></div>
      <div class="todo-item"><input type="text"></div>
      <div class="todo-item"><input type="text"></div>
    </div>
  </div>

  <!-- PAGE 5 (FIXED REAL STORY) -->
  <div class="page">
    <h1 class="title">📖 Real Story</h1>

    <p>This is your safe space 💖</p>

    <textarea id="realStory" class="pink-box"></textarea>

    <button onclick="saveStory()">💾 Save Story</button>
  </div>

  <!-- PAGE 6 -->
  <div class="page">
    <h1 class="title">✨ Glow Routine</h1>

    <label><input type="checkbox"> Water 💧</label><br>
    <label><input type="checkbox"> Skincare 🧴</label><br>
    <label><input type="checkbox"> Exercise 🏃‍♀️</label><br>
    <label><input type="checkbox"> Learn 📚</label><br>
  </div>

  <!-- PAGE 7 -->
  <div class="page">
    <h1 class="title">💌 Closing</h1>

    <textarea class="big"></textarea>
    <textarea class="big"></textarea>

    <button onclick="saveEntry()">💾 Save Entry</button>
  </div>

  <!-- PAGE 8 -->
  <div class="page">
    <h1 class="title">⚙️ Settings</h1>

    <label>Font</label>
    <select onchange="changeFont(this.value)">
      <option value="Poppins">Poppins</option>
      <option value="Georgia">Georgia</option>
      <option value="Playfair Display">Elegant</option>
    </select>

    <label>Music</label>
    <select onchange="changeMusic(this.value)">
      <option value="">None</option>
      <option value="soft.mp3">Soft</option>
      <option value="rain.mp3">Rain</option>
      <option value="lofi.mp3">Lofi</option>
    </select>
  </div>

</div>
